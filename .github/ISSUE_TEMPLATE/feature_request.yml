name: Feature request
description: Suggest a new capability or improvement
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Search existing issues + discussions before opening a new one.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve? What does the SDK make difficult today?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What API or behavior would solve this for you?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Links, related issues, references to other SDKs that handle this well, etc.
