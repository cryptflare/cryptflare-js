name: Bug report
description: Report a defect in the SDK
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Search existing issues first.
        For security vulnerabilities, email security@cryptflare.com - do not open a public issue.
  - type: input
    id: sdk-version
    attributes:
      label: SDK version
      description: Output of `npm list @cryptflare/sdk` or value from `package.json`.
      placeholder: 0.3.0
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: v20.11.1
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime / environment
      description: Node, Bun, Deno, Cloudflare Workers, browser, etc.
      placeholder: Node 20 on Linux
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug + the actual behavior observed.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Smallest possible code snippet or repo link that reproduces the issue.
        Strip any tokens, IDs, secrets - replace with placeholders.
      render: ts
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / stack trace
      render: shell
  - type: checkboxes
    id: terms
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues and could not find a duplicate.
          required: true
        - label: I redacted secrets, tokens, and PII from the report.
          required: true
