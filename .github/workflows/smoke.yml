name: Smoke

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: Specific version to install (defaults to latest)
        required: false

permissions:
  contents: read

jobs:
  install:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    name: Install + import (${{ matrix.os }} / Node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22, 24]
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Wait for npm registry to index
        if: github.event_name == 'workflow_run'
        run: sleep 30
        shell: bash

      - name: Install
        shell: bash
        run: |
          mkdir smoke && cd smoke
          npm init -y >/dev/null
          if [ -n "${{ inputs.version }}" ]; then
            npm install "@cryptflare/sdk@${{ inputs.version }}"
          else
            npm install "@cryptflare/sdk@latest"
          fi

      - name: Verify import + exports
        shell: bash
        working-directory: smoke
        run: |
          cat > verify.mjs <<'EOF'
          import { CryptFlare } from '@cryptflare/sdk';

          if (typeof CryptFlare !== 'function') {
            throw new Error('CryptFlare export is not a constructor');
          }

          // The SDK constructor requires apiKey OR serviceToken OR getToken.
          // We pass a dummy apiKey + an unreachable baseUrl so the client
          // builds without errors but any network call fails fast.
          const c = new CryptFlare({
            apiKey: 'cf_live_smoke_test_apikey',
            baseUrl: 'http://127.0.0.1:1',
            defaults: {
              organisation: 'org_smoke',
              workspace: 'wsp_smoke',
              environment: 'env_smoke',
            },
            maxRetries: 0,
            timeoutMs: 1000,
          });

          if (typeof c.secrets?.list !== 'function') {
            throw new Error('client.secrets.list is missing');
          }

          // Reach far enough into the runtime to confirm the resource fan-out
          // is wired up. We expect a network failure - the test passes when
          // the error is a transport error and not a configuration error or
          // missing-export error.
          try {
            await c.secrets.list({ pod: 'pod_smoke' });
            throw new Error('expected network error, got success');
          } catch (err) {
            const msg = String(err?.message || err);
            if (/configuration_error|configuration error/i.test(msg)) {
              throw new Error('unexpected configuration error: ' + msg);
            }
            if (!/ECONNREFUSED|fetch failed|network|connect|ENOTFOUND|timeout|aborted/i.test(msg)) {
              throw new Error('unexpected error: ' + msg);
            }
          }

          console.log('smoke OK');
          EOF
          node verify.mjs
